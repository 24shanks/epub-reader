<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>布吉阅读室</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f7f8fa;
            --text-color: #333;
            --text-secondary: #888;
            --card-bg: #fff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-right, .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--primary-color);
        }

        .nav-btn {
            background: none;
            border: none;
            color: inherit;
            padding: 4px 8px;
            font-size: inherit;
            cursor: pointer;
        }

        /* 警告条 */
        .warning-banner {
            display: none;
            background-color: #fff8e1;
            padding: 10px 16px;
            font-size: 12px;
            color: #d48806;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .warning-banner button {
            background-color: #fadb14;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 12px;
        }

        /* 内容区 */
        .content {
            padding: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--primary-color);
            border-radius: 2px;
            margin-right: 8px;
        }

        /* 书籍列表网格 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px 12px;
        }

        .book-item {
            display: flex;
            flex-direction: column;
        }

        .book-cover-container {
            width: 100%;
            aspect-ratio: 3 / 4;
            border-radius: 6px;
            background-color: #e5e5ea;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .book-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .book-info {
            margin-top: 8px;
        }

        .book-title {
            font-size: 13px;
            line-height: 1.4;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 500;
        }

        /* 加载状态与空状态 */
        .status-container {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 14px;
            grid-column: 1 / -1;
        }

        /* 底部分页 */
        .pagination {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 0 10px;
        }

        .page-btn {
            background-color: var(--card-bg);
            border: 1px solid #e5e5ea;
            border-radius: 20px;
            padding: 8px 24px;
            font-size: 14px;
            color: var(--text-color);
        }

        .page-btn:active {
            background-color: #f2f2f7;
        }

        .page-btn:disabled {
            color: #c7c7cc;
            background-color: #f9f9f9;
        }

        .page-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 移动端专属夜间模式 */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --text-secondary: #aaa;
            --card-bg: #1e1e1e;
        }

        body.dark-mode .navbar {
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
            border-bottom: 1px solid #333;
        }

        body.dark-mode .book-cover-container {
            background-color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        body.dark-mode .page-btn {
            border-color: #444;
        }

        body.dark-mode .page-btn:active {
            background-color: #2c2c2e;
        }

        body.dark-mode .page-btn:disabled {
            background-color: #1a1a1a;
            color: #555;
        }

        body.dark-mode .warning-banner {
            background-color: #332701;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <script>
        function applyDarkMode() {
            const isDark = localStorage.getItem('readerDarkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            const toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) {
                toggleBtn.innerText = isDark ? '☀️' : '🌙';
            }
        }
        
        window.toggleTheme = function() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('readerDarkMode', isDark);
            const toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) {
                toggleBtn.innerText = isDark ? '☀️' : '🌙';
            }
        }
        
        applyDarkMode();
    </script>

    <div class="navbar">
        <div class="nav-left">
            <button class="nav-btn" onclick="toggleTheme()" id="theme-toggle" style="font-size: 16px;">🌙</button>
        </div>
        <div class="nav-title">布吉阅读室</div>
        <div class="nav-right" id="nav-user-area">
            <span style="font-size:12px; color:#888;">未登录</span>
        </div>
    </div>

    <div class="warning-banner" id="warning-banner" style="display: none;">
        <span id="warning-text">数据不同步</span>
        <button onclick="initBooks()">同步</button>
    </div>

    <div class="content">
        <h2 class="section-title">我的书架</h2>
        
        <div class="book-grid" id="book-list">
            <div class="status-container">加载中...</div>
        </div>

        <div class="pagination" id="pagination-controls">
            <button class="page-btn" id="btn-prev" onclick="prevPage()">上一页</button>
            <span class="page-text" id="page-info">1 / 1</span>
            <button class="page-btn" id="btn-next" onclick="nextPage()">下一页</button>
        </div>
    </div>

    <script>
        let allBooks = [];
        let currentPage = 1;
        let totalPages = 1;

        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            return userStr ? JSON.parse(userStr) : null;
        }

        function renderUser() {
            const user = getCurrentUser();
            const userArea = document.getElementById('nav-user-area');
            if (user) {
                userArea.innerHTML = `
                    <a href="/history.html" style="color: inherit; text-decoration: none; margin-right: 8px;">${user.username}</a>
                    <button class="nav-btn" onclick="logout()">退出</button>
                `;
            } else {
                userArea.innerHTML = `
                    <a href="/login.html" style="color: inherit; text-decoration: none;">登录</a>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }

        async function initBooks() {
            const user = getCurrentUser();
            if (!user || user.is_admin !== 1) {
                alert('只有管理员可以初始化数据');
                return;
            }
            try {
                const response = await fetch('/api/admin/books/init-only-new', { method: 'POST' });
                const result = await response.json();
                alert(result.message || '初始化完成');
                document.getElementById('warning-banner').style.display = 'none';
                fetchBooks(1);
            } catch (err) {
                alert('初始化请求失败');
            }
        }

        async function checkDataSync() {
            const user = getCurrentUser();
            if (!user || user.is_admin !== 1) return; // 仅管理员检测

            try {
                const [booksResponse, dbResponse] = await Promise.all([
                    fetch('/api/books'),
                    fetch('/api/db/books?page=1&pageSize=1')
                ]);

                const epubFiles = await booksResponse.json();
                const dbResult = await dbResponse.json();

                const epubCount = epubFiles.length;
                const dbCount = dbResult.pagination ? dbResult.pagination.total : 0;

                if (epubCount !== dbCount) {
                    document.getElementById('warning-text').innerText = `本地: ${epubCount} | 库: ${dbCount}`;
                    document.getElementById('warning-banner').style.display = 'flex';
                }
            } catch (err) {
                console.error('检查数据同步失败:', err);
            }
        }

        async function fetchBooks(page = 1) {
            try {
                const response = await fetch(`/api/db/books?page=${page}&pageSize=15`);
                const result = await response.json();

                const listElement = document.getElementById('book-list');

                if (!result.data || result.data.length === 0) {
                    listElement.innerHTML = '<div class="status-container">书架空空如也，请联系管理员添加书籍</div>';
                    document.getElementById('pagination-controls').style.display = 'none';
                    return;
                }

                allBooks = result.data;
                currentPage = result.pagination.page;
                totalPages = result.pagination.totalPages;
                window.paginationData = result.pagination;

                renderPage();

            } catch (err) {
                console.error("加载书架列表失败:", err);
                document.getElementById('book-list').innerHTML = '<div class="status-container">加载失败，请检查网络。</div>';
            }
        }

        function renderPage() {
            const listElement = document.getElementById('book-list');
            listElement.innerHTML = '';

            allBooks.forEach(book => {
                const coverUrl = book.cover_path || '/js/placeholder.png';
                
                // 去除可能为空的副标题等，保持极简
                const itemHtml = `
                    <div class="book-item" onclick="openReader('${encodeURIComponent(book.file_path)}')">
                        <div class="book-cover-container">
                            <img class="book-cover" src="${coverUrl}" alt="${book.title}" onerror="this.src='/js/placeholder.png'">
                        </div>
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                        </div>
                    </div>
                `;
                listElement.innerHTML += itemHtml;
            });

            updatePaginationControls();
        }

        function openReader(filePath) {
            window.location.href = '/reader.html?book=' + filePath;
        }

        function updatePaginationControls() {
            const paginationContainer = document.getElementById('pagination-controls');
            const pageInfo = document.getElementById('page-info');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');

            if (totalPages > 1) {
                paginationContainer.style.display = 'flex';
                pageInfo.innerText = `${currentPage} / ${totalPages}`;

                btnPrev.disabled = currentPage <= 1;
                btnNext.disabled = currentPage >= totalPages;
            } else {
                paginationContainer.style.display = 'none';
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                fetchBooks(currentPage - 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                fetchBooks(currentPage + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 初始化执行
        window.addEventListener('DOMContentLoaded', () => {
            renderUser();
            fetchBooks(1);
            checkDataSync();
        });
    </script>
</body>
</html>

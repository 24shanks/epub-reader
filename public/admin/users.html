<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        #header { max-width: 900px; margin: 0 auto; padding: 15px; }
        #content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px 15px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
        .table-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 500;
            color: #333;
        }
        th:nth-child(3), td:nth-child(3),
        th:nth-child(7), td:nth-child(7) {
            width: 120px;
            min-width: 120px;
        }
        tr:hover { background: #f8f9fa; }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-admin { background: #ffc107; color: #333; }
        .status-user { background: #e0e0e0; color: #666; }
        .status-allowed { background: #28a745; color: white; }
        .status-disabled { background: #dc3545; color: white; }
        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-right: 5px;
        }
        .btn-toggle-admin {
            background: #ffc107;
            color: #333;
        }
        .btn-toggle-allowed {
            background: #17a2b8;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .page-info { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div id="header"></div>
    <div id="content">
        <a href="/admin/index.html" class="back-link">← 返回管理后台</a>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>管理员</th>
                        <th>允许登录</th>
                        <th>注册时间</th>
                        <th>最后登录</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination-controls" style="display:none;">
                <button id="btn-prev" onclick="prevPage()">上一页</button>
                <span class="page-info" id="page-info"></span>
                <button id="btn-next" onclick="nextPage()">下一页</button>
            </div>
        </div>
    </div>

    <script src="/header.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;

        async function fetchUsers(page = 1) {
            try {
                const response = await fetch(`/api/admin/users?page=${page}&pageSize=${pageSize}`);
                const result = await response.json();
                if (result.data) {
                    renderTable(result.data);
                    currentPage = result.pagination.page;
                    totalPages = result.pagination.totalPages;
                    updatePaginationControls();
                }
            } catch (err) {
                console.error('获取用户列表失败:', err);
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('user-table-body');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td><span class="status-badge ${user.is_admin ? 'status-admin' : 'status-user'}">${user.is_admin ? '管理员' : '普通用户'}</span></td>
                    <td><span class="status-badge ${user.is_allowed ? 'status-allowed' : 'status-disabled'}">${user.is_allowed ? '允许' : '禁用'}</span></td>
                    <td>${user.created_at ? new Date(user.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>${user.last_login ? new Date(user.last_login).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <button class="btn-action btn-toggle-admin" onclick="toggleAdmin(${user.id}, ${user.is_admin ? 0 : 1})">${user.is_admin ? '取消管理员' : '设为管理员'}</button>
                        <button class="btn-action btn-toggle-allowed" onclick="toggleAllowed(${user.id}, ${user.is_allowed ? 0 : 1})">${user.is_allowed ? '禁用' : '启用'}</button>
                    </td>
                </tr>
            `).join('');
        }

        function updatePaginationControls() {
            const container = document.getElementById('pagination-controls');
            const pageInfo = document.getElementById('page-info');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            container.style.display = totalPages > 1 ? 'flex' : 'none';
            pageInfo.innerText = `第 ${currentPage} / ${totalPages} 页`;
            btnPrev.disabled = currentPage <= 1;
            btnNext.disabled = currentPage >= totalPages;
        }

        async function toggleAdmin(userId, isAdmin) {
            try {
                await fetch(`/api/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_admin: isAdmin })
                });
                fetchUsers(currentPage);
            } catch (err) {
                alert('操作失败');
            }
        }

        async function toggleAllowed(userId, isAllowed) {
            try {
                await fetch(`/api/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_allowed: isAllowed })
                });
                fetchUsers(currentPage);
            } catch (err) {
                alert('操作失败');
            }
        }

        function prevPage() {
            if (currentPage > 1) fetchUsers(currentPage - 1);
        }

        function nextPage() {
            if (currentPage < totalPages) fetchUsers(currentPage + 1);
        }

        window.onload = async () => {
            const user = getCurrentUser();
            if (!user || user.is_admin !== 1) {
                alert('无权限访问');
                location.href = '/index.html';
                return;
            }
            await initHeader();
            fetchUsers(1);
        };
    </script>
</body>
</html>
